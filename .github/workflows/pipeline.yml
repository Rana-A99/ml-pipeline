name: ML Pipeline

on:
  push:
    branches:
      - "**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: pip install mlflow

      - name: Train
        run: |
          python train.py | tee output.txt

      - name: Extract Run ID
        run: |
          grep "RUN_ID=" output.txt | cut -d '=' -f2 > model_info.txt

      - name: Upload model_info
        uses: actions/upload-artifact@v4
        with:
          name: model_info
          path: model_info.txt

      - name: Upload mlruns
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: mlruns

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: pip install mlflow

      - name: Download model_info
        uses: actions/download-artifact@v4
        with:
          name: model_info

      - name: Download mlruns
        uses: actions/download-artifact@v4
        with:
          name: mlruns
          path: .

      - name: Check accuracy
        run: python check_threshold.py

      - name: Mock Deploy
        run: echo "Building Docker image for Run ID $(cat model_info.txt)"